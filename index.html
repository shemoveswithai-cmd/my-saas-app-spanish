<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Addictive App - Español</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              /* Exact Color Palette */
              'rosa-principal': '#F5B2E1',
              'rosa-claro': '#F9D4EE',
              'negro-fondo': '#111111',
              'gris-oscuro': '#1C1C1C',
              'gris-medio': '#2E2E2E',
              'blanco-texto': '#F0F0F0',
              'gris-atenuado': '#A0A0A0',
              /* Legacy aliases for compatibility */
              'smw-pink': '#F5B2E1',
              'smw-pink-light': '#F9D4EE',
              'smw-pink-medium': '#F5B2E1',
              'smw-black': '#111111',
              'smw-gray': '#2E2E2E',
              'smw-gray-dark': '#1C1C1C',
              'smw-light': '#F0F0F0'
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.3s ease-out'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' }
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' }
              }
            }
          }
        }
      }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root {
        --rosa-principal: #F5B2E1;
        --rosa-claro: #F9D4EE;
        --negro-fondo: #111111;
        --gris-oscuro: #1C1C1C;
        --gris-medio: #2E2E2E;
        --blanco-texto: #F0F0F0;
        --gris-atenuado: #A0A0A0;
      }
      body {
        background-color: #111111;
        margin: 0;
        font-family: sans-serif;
        color: #F0F0F0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
